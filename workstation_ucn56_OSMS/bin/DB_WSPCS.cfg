!
! Configuration File Name: WSPCS.cfg
! Valid options are:
!   -HOST1 hostname	This sets the host for CommLink1
!   -HOST1 portno       This sets the hostno for CommLink1
!   -HOST2 hostname	This sets the host for CommLink2
!   -HOST2 portno       This sets the hostno for CommLink2

! host 1
! hostname of host1
! portno of host1
! Examples ygn5c1
-HOST1 ucn3c2 
-PORT1 3333 

! host 2
! hostname of host2
! Example ygn5c2
-HOST2 ucn3c1
-PORT2 4444

! SEND
! decide to send packet to Terminal
-SEND 1
