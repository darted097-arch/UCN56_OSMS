!
! Configuration File Name: WSPCS.cfg
! Valid options are:
!   -HOST1 hostname	This sets the host for CommLink1
!   -HOST2 hostname	This sets the host for CommLink2
!   -PRIMARY hostname	This sets the primary host, i.e., the host with which
!			this workstation will communicate.  Using this option 
!			with a valid HOST1 or HOST2 will keep disable the
!			primary/backup algorithm. The given hostname will
!			always be the primary connection.
!   -FDDI ON or OFF 	ON activates FDDI montoring upon startup, OFF deactivates

! host 1
! hostname of host1
! Examples ygn5c1
-HOST1 ucn6c1 
-PORT1 30000

! host 2
! hostname of host2
! Example ygn3c2
-HOST2 ucn6c2
-PORT2 30001

! primary connection
! hostname of forced primary connection, i.e., disregard which host is
!in better condition
! Example ygn3c2
-PRIMARY ucn6c1

! fddi monitoring
! set option to ON to activate or OFF to deactivate (example: -FDDI OFF)
-FDDI OFF

! automatic modem connection
! set option to hostname of remote host to activate or set
! to OFF to deactivate (example: -MODEM ygn56spare)
-MODEM OFF

! SEND
! decide to send packet to Terminal
-SEND 1
